<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menace AI V2</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
    }

    .container {
      background: rgba(0,0,0,0.4);
      padding: 25px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 { margin-bottom: 20px; }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { opacity: 0.9; }

    p {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Menace AI V2 😈</h1>
    <p>Click below to open the Menace AI backend. Upload your photo, type a prompt, and generate videos directly.</p>
    
    <button onclick="openBackend()">Open Menace AI Backend</button>

    <p>Works best on your phone or desktop browser. Videos are downloadable directly from Gradio.</p>
  </div>

  <script>
    function openBackend() {
      // Your current Gradio link
      window.open("https://290a6c3ed872d914db.gradio.live/", "_blank");
    }
  </script>

</html>
